<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>YT.PLAY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">YT.<span>PLAY</span></div>
    <div class="login-sub">닉네임과 4자리 PIN을 입력하세요</div>

    <div class="login-field">
      <label>닉네임</label>
      <input type="text" id="loginNickname" placeholder="닉네임 입력" maxlength="16" autocomplete="off">
    </div>
    <div class="login-field">
      <label>PIN (4자리)</label>
      <div class="pin-row">
        <input class="pin-input" type="password" inputmode="numeric" maxlength="1" id="pin0">
        <input class="pin-input" type="password" inputmode="numeric" maxlength="1" id="pin1">
        <input class="pin-input" type="password" inputmode="numeric" maxlength="1" id="pin2">
        <input class="pin-input" type="password" inputmode="numeric" maxlength="1" id="pin3">
      </div>
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" id="loginBtn">입장하기</button>
    <div class="login-hint">처음 입력한 닉네임+PIN이 계정이 됩니다</div>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div class="app" id="mainApp" style="display:none">

  <!-- HEADER -->
  <header>
    <div class="logo">YT.<span>PLAY</span></div>

    <div class="input-row">
      <input class="url-input" id="urlInput" type="text"
        placeholder="YouTube URL 붙여넣기..."
        autocomplete="off" spellcheck="false">
      <button class="add-btn" id="addBtn">+ 추가</button>
    </div>

    <div class="header-right">
      <div class="quality-wrap">
        <select class="quality-sel" id="qualitySel" title="화질 선택">
          <option value="1080">1080p</option>
          <option value="720" selected>720p</option>
          <option value="480">480p</option>
          <option value="360">360p</option>
        </select>
      </div>

      <button class="icon-btn" id="audioModeBtn" title="듣기 모드" onclick="window._toggleAudioMode()">🎧</button>
      <button class="icon-btn" id="themeBtn" title="테마 변경" onclick="window._toggleTheme()">🌙</button>
      <div class="user-badge" id="userBadge" title="로그아웃" onclick="window._logout()"></div>
      <div class="fb-status sync" id="fbStatus">● 연결 중...</div>
    </div>
  </header>

  <!-- PLAYER -->
  <main class="player-area">
    <div class="video-wrapper" id="videoWrapper">
      <div class="empty-player" id="emptyPlayer">
        <div class="icon">▶</div>
        <div>재생목록에 YouTube 링크를 추가하세요</div>
      </div>
      <!-- Audio mode overlay -->
      <div class="audio-overlay" id="audioOverlay" style="display:none">
        <img class="audio-thumb" id="audioThumb" src="" alt="">
        <div class="audio-info">
          <div class="audio-eq">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="audio-title" id="audioTitle">—</div>
          <div class="audio-channel" id="audioChannel">—</div>
        </div>
      </div>
      <video id="videoEl" controls style="display:none"></video>
    </div>

    <div class="now-playing" id="nowPlaying">
      <img class="np-thumb" id="npThumb" src="" alt="" style="display:none">
      <div class="np-info">
        <div class="np-title empty" id="npTitle">재생 중인 영상 없음</div>
        <div class="np-channel" id="npChannel">—</div>
      </div>
    </div>

    <div class="status-bar" id="statusBar"></div>
  </main>

  <!-- QUEUE -->
  <aside class="queue-panel">
    <div class="queue-header">
      <span class="queue-title">재생목록</span>
      <div class="queue-meta">
        <span class="sort-hint">⠿ 드래그로 순서 변경</span>
        <span class="queue-count" id="queueCount">0개</span>
      </div>
    </div>
    <div class="queue-list" id="queueList">
      <div class="empty-queue">아직 영상이 없어요.<br>위에서 YouTube 링크를 추가하세요.</div>
    </div>
  </aside>

  <!-- CONTROLS -->
  <footer class="controls-bar">
    <button class="ctrl-btn" onclick="window._prevTrack()">⏮ 이전</button>
    <button class="ctrl-btn primary" id="playPauseBtn" onclick="window._togglePlayPause()">▶ 재생</button>
    <button class="ctrl-btn" onclick="window._nextTrack()">다음 ⏭</button>
    <button class="ctrl-btn" id="autoplayBtn" onclick="window._toggleAutoplay()">자동재생 ON</button>
    <button class="ctrl-btn" id="loopBtn" onclick="window._toggleLoop()">반복 OFF</button>
    <div class="volume-row">
      <span class="vol-label">VOL</span>
      <input type="range" id="volSlider" min="0" max="1" step="0.05" value="1"
             oninput="window._setVolume(this.value)">
    </div>
  </footer>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
