<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YT Play</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 로그인 오버레이 -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <div class="logo">YT<span>Play</span></div>
    <p class="login-sub">닉네임과 PIN으로 접속하세요</p>
    <input type="text" id="nickInput" placeholder="닉네임" autocomplete="off" spellcheck="false">
    <div class="pin-row">
      <input type="password" class="pin-i" maxlength="1" id="p1" inputmode="numeric">
      <input type="password" class="pin-i" maxlength="1" id="p2" inputmode="numeric">
      <input type="password" class="pin-i" maxlength="1" id="p3" inputmode="numeric">
      <input type="password" class="pin-i" maxlength="1" id="p4" inputmode="numeric">
    </div>
    <button id="loginBtn">접속하기</button>
  </div>
</div>

<!-- 헤더 -->
<header class="header">
  <div class="header-inner">
    <div class="logo-sm" onclick="showHome()">YT<span>Play</span></div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="검색" autocomplete="off">
      <button id="searchBtn">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </button>
    </div>
    <button id="userBtn" class="user-btn" onclick="logout()">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    </button>
  </div>
</header>

<!-- 플레이어 -->
<div id="playerView" class="player-wrap hidden">
  <video id="videoEl" controls playsinline></video>
  <div id="playerMeta" class="player-meta">
    <div id="playerTitle" class="player-title"></div>
    <div id="playerChannel" class="player-channel"></div>
    <div class="player-actions">
      <button class="action-btn" id="saveFromPlayer">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6z"/></svg>
        보관함 추가
      </button>
    </div>
  </div>
</div>

<!-- 메인 컨텐츠 -->
<main id="contentArea">

  <!-- 홈 페이지 -->
  <div id="homePage">
    <div id="searchList" class="feed"></div>
    <div id="emptyHome" class="empty-state">
      <div class="empty-icon">▶</div>
      <div>YouTube 동영상을 검색해보세요</div>
    </div>
  </div>

  <!-- 보관함 페이지 -->
  <div id="libraryPage" class="hidden">
    <div class="lib-tabs">
      <button class="lib-tab active" data-tab="videos">동영상</button>
      <button class="lib-tab" data-tab="music">노래</button>
      <button class="lib-tab" data-tab="offline">오프라인</button>
    </div>
    <div id="libraryList" class="lib-list"></div>
    <div id="emptyLib" class="empty-state hidden">
      <div class="empty-icon">📂</div>
      <div>보관함이 비어있어요</div>
      <p>검색 결과에서 + 버튼으로 추가하세요</p>
    </div>
  </div>

</main>

<!-- 하단 네비 -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="navHome" onclick="showHome()">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>홈</span>
  </button>
  <button class="nav-btn" id="navLib" onclick="showLibrary()">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
    <span>보관함</span>
  </button>
</nav>

<!-- 토스트 -->
<div id="toast" class="toast"></div>

<!-- 보관함 추가 모달 -->
<div id="saveModal" class="modal-bg hidden">
  <div class="modal-box">
    <div class="modal-title">보관함에 추가</div>
    <button class="modal-opt" onclick="saveToTab('videos')">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M21 3H3c-1.11 0-2 .89-2 2v12a2 2 0 0 0 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5a2 2 0 0 0-2-2zm0 14H3V5h18v12z"/></svg>
      동영상으로 저장
    </button>
    <button class="modal-opt" onclick="saveToTab('music')">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      노래로 저장
    </button>
    <button class="modal-opt" onclick="saveToTab('offline')">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      오프라인으로 저장
    </button>
    <button class="modal-cancel" onclick="closeModal()">취소</button>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
