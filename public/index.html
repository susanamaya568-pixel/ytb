<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YT Play - Clean Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h1 class="logo">YT <span>Play</span></h1>
            <input type="text" id="nickInput" placeholder="닉네임 (대소문자 무관)" autocomplete="off">
            <div class="pin-row">
                <input type="password" class="pin-i" maxlength="1" inputmode="numeric">
                <input type="password" class="pin-i" maxlength="1" inputmode="numeric">
                <input type="password" class="pin-i" maxlength="1" inputmode="numeric">
                <input type="password" class="pin-i" maxlength="1" inputmode="numeric">
            </div>
            <button id="loginBtn">로그인 / 가입</button>
        </div>
    </div>

    <div class="app">
        <header class="header">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="YouTube 검색 또는 주소 입력">
                <button id="searchBtn">🔍</button>
            </div>
        </header>

        <section id="playerView" class="player-view" style="display:none">
            <div class="video-container">
                <video id="videoEl" controls playsinline></video>
                <div id="audioUI" class="audio-ui" style="display:none">🎧 데이터 절약 및 고음질 모드</div>
            </div>
            <div class="video-info">
                <h2 id="npTitle">제목</h2>
                <div class="p-actions">
                    <select id="qualitySel" class="q-select">
                        <option value="1080">1080p</option>
                        <option value="720" selected>720p</option>
                        <option value="360">360p</option>
                    </select>
                    <button id="downloadBtn" class="m-btn">↓ 저장</button>
                    <button id="audioModeBtn" class="m-btn">🎧 모드</button>
                    <button id="themeBtn" class="m-btn">🌓</button>
                </div>
            </div>
        </section>

        <main class="feed">
            <div class="tabs">
                <button class="tab active" data-tab="search">홈</button>
                <button class="tab" data-tab="videos">동영상</button>
                <button class="tab" data-tab="music">노래목록</button>
                <button class="tab" data-tab="offline">저장됨</button>
            </div>
            <div id="itemList" class="item-list"></div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="location.reload()">🏠 <span>홈</span></div>
            <div class="nav-item">🎞️ <span>Shorts</span></div>
            <div class="nav-item plus">+</div>
            <div class="nav-item">🔔 <span>알림</span></div>
            <div class="nav-item" onclick="document.querySelector('[data-tab=videos]').click()">📂 <span>보관함</span></div>
        </nav>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
