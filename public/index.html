<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YT Play</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white">
    <div id="loginOverlay" class="position-fixed top-0 start-0 w-100 h-100 bg-white z-3 d-flex align-items-center justify-content-center">
        <div class="text-center w-75" style="max-width: 320px;">
            <h2 class="fw-bold mb-4">YT <span class="text-danger">Play</span></h2>
            <input type="text" id="nickInput" class="form-control mb-3" placeholder="닉네임">
            <div class="d-flex gap-2 mb-4 justify-content-center">
                <input type="password" class="form-control text-center pin-i" maxlength="1" id="p1" inputmode="numeric">
                <input type="password" class="form-control text-center pin-i" maxlength="1" id="p2" inputmode="numeric">
                <input type="password" class="form-control text-center pin-i" maxlength="1" id="p3" inputmode="numeric">
                <input type="password" class="form-control text-center pin-i" maxlength="1" id="p4" inputmode="numeric">
            </div>
            <button id="loginBtn" class="btn btn-danger w-100 py-2 rounded-pill fw-bold">시작하기</button>
        </div>
    </div>

    <nav class="navbar navbar-light bg-white border-bottom sticky-top py-2">
        <div class="container-fluid px-3">
            <a class="navbar-brand fw-bold m-0" href="#" onclick="showHome()">YT <span class="text-danger">Play</span></a>
            <div class="flex-grow-1 px-3">
                <div class="input-group input-group-sm">
                    <input type="text" id="searchInput" class="form-control border-0 bg-light rounded-pill" placeholder="YouTube 검색">
                    <button class="btn btn-link text-dark text-decoration-none" id="searchBtn">🔍</button>
                </div>
            </div>
            <button id="audioModeBtn" class="btn btn-sm btn-light rounded-circle">🎧</button>
        </div>
    </nav>

    <main class="container-fluid p-0 pb-5">
        <div id="playerView" class="ratio ratio-16x9 bg-black mb-3" style="display:none;">
            <video id="videoEl" controls playsinline></video>
        </div>

        <div id="contentArea">
            <div id="homePage">
                <div id="searchList" class="list-group list-group-flush"></div>
            </div>
            <div id="libraryPage" style="display:none;">
                <ul class="nav nav-pills nav-fill bg-light p-1 rounded-3 mx-3 my-3">
                    <li class="nav-item"><button class="nav-link active btn-sm" data-tab="videos">동영상</button></li>
                    <li class="nav-item"><button class="nav-link btn-sm" data-tab="music">노래</button></li>
                    <li class="nav-item"><button class="nav-link btn-sm" data-tab="offline">오프라인</button></li>
                </ul>
                <div id="libraryList" class="list-group list-group-flush"></div>
            </div>
        </div>
    </main>

    <div class="fixed-bottom bg-white border-top d-flex justify-content-around py-2">
        <button class="btn btn-link text-dark p-0 text-decoration-none" onclick="showHome()">🏠<br><small>홈</small></button>
        <button class="btn btn-link text-muted p-0 text-decoration-none" onclick="showLibrary()">📂<br><small>보관함</small></button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
